name: Build executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: matrix.name == 'linux'
        run: sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install flask customtkinter pyinstaller pillow

      # ── Icon generation ────────────────────────────────────────────────

      - name: Generate icons (Linux — cairosvg)
        if: matrix.name == 'linux'
        run: |
          pip install cairosvg
          python3 - <<'EOF'
          import cairosvg, io, os
          from PIL import Image
          os.makedirs("assets", exist_ok=True)
          for size, name in [(512, "icon_512.png"), (256, "icon.png")]:
              data = cairosvg.svg2png(url="water-cup-svgrepo-com.svg",
                                      output_width=size, output_height=size)
              Image.open(io.BytesIO(data)).convert("RGBA").save(f"assets/{name}")
          print("PNGs done")
          EOF

      - name: Generate icons (macOS — ImageMagick)
        if: matrix.name == 'macos'
        run: |
          brew install imagemagick
          mkdir -p assets
          magick water-cup-svgrepo-com.svg -resize 512x512 assets/icon_512.png
          magick water-cup-svgrepo-com.svg -resize 256x256 assets/icon.png

      - name: Generate icons (Windows — magick pre-installed)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          magick water-cup-svgrepo-com.svg -resize 512x512 assets/icon_512.png
          magick water-cup-svgrepo-com.svg -resize 256x256 assets/icon.png

      # ── Platform-specific icon formats ─────────────────────────────────

      - name: Generate ICO (Windows)
        if: matrix.name == 'windows'
        run: |
          python -c "
          from PIL import Image
          src = Image.open('assets/icon_512.png').convert('RGBA')
          imgs = [src.resize((s,s), Image.LANCZOS) for s in [16,32,48,64,128,256]]
          imgs[0].save('assets/icon.ico', format='ICO', append_images=imgs[1:])
          print('ICO done')
          "

      - name: Generate ICNS (macOS)
        if: matrix.name == 'macos'
        run: |
          python3 - <<'EOF'
          from PIL import Image
          import subprocess, os
          src = Image.open("assets/icon_512.png").convert("RGBA")
          os.makedirs("assets/icon.iconset", exist_ok=True)
          for name, size in [
              ("icon_16x16.png", 16),    ("icon_16x16@2x.png", 32),
              ("icon_32x32.png", 32),    ("icon_32x32@2x.png", 64),
              ("icon_128x128.png", 128), ("icon_128x128@2x.png", 256),
              ("icon_256x256.png", 256), ("icon_256x256@2x.png", 512),
              ("icon_512x512.png", 512),
          ]:
              src.resize((size, size), Image.LANCZOS).save(f"assets/icon.iconset/{name}")
          subprocess.run(["iconutil", "-c", "icns", "assets/icon.iconset",
                          "-o", "assets/icon.icns"], check=True)
          print("ICNS done")
          EOF

      # ── PyInstaller build ──────────────────────────────────────────────

      - name: Build
        run: pyinstaller launcher.spec

      - name: Zip macOS app
        if: matrix.name == 'macos'
        run: cd dist && zip -r QuizLauncher-macos.zip QuizLauncher.app

      # ── Upload artifacts ───────────────────────────────────────────────

      - name: Upload Linux binary
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: QuizLauncher-linux
          path: dist/QuizLauncher

      - name: Upload Windows exe
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: QuizLauncher-windows
          path: dist/QuizLauncher.exe

      - name: Upload macOS app
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: QuizLauncher-macos
          path: dist/QuizLauncher-macos.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Download

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows  | `QuizLauncher.exe` | Double-click to run |
            | macOS    | `QuizLauncher-macos.zip` | Unzip → double-click the .app |
            | Linux    | `QuizLauncher` | `chmod +x QuizLauncher` then run it |

            > **macOS:** if Gatekeeper blocks it, right-click → Open → Open.

            ---
          files: |
            artifacts/QuizLauncher-linux/QuizLauncher
            artifacts/QuizLauncher-windows/QuizLauncher.exe
            artifacts/QuizLauncher-macos/QuizLauncher-macos.zip
