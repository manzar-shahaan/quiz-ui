<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ quiz.title if quiz else "Quiz" }} – Quiz UI</title>

  <!-- Lato via bunny.net -->
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=lato:400" rel="stylesheet" />

  {# cache-bust static assets when layouts change #}
  {% set _v = '20260213a' %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/quiz_ui.css', v=_v) }}">
  <script defer src="{{ url_for('static', filename='js/quiz.js', v=_v) }}"></script>
</head>

<body>
  <header class="bs-header">
    <div class="bs-header-left">
      <span class="bs-course-name">{{ quiz_filename or "Practice" }}</span>
    </div>
    <div class="bs-header-right">
      {% if elapsed_seconds is defined and elapsed_seconds is not none %}
        <span class="bs-header-timer-label">Time</span>
        <span class="bs-timer" data-live="1" data-elapsed="{{ elapsed_seconds|int }}">—</span>
      {% endif %}
    </div>
  </header>

  <main class="bs-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
